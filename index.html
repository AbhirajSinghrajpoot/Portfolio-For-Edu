<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editkaro.in Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav>
    <h2 class="logo">Editkaro.in</h2>
    <ul>
      <li data-filter="all">All</li>
      <li data-filter="reels">Reels</li>
      <li data-filter="ads">Ads</li>
      <li data-filter="gaming">Gaming</li>
      <li data-filter="anime">Anime</li>
    </ul>
  </nav>
</header>

<section class="gallery">

  <div class="item reels">
    <img src="assets/reels/Img1.png" onclick="openLightbox('assets/reels/vid1.mp4')">
  </div>

  <div class="item reels">
    <img src="assets/reels/TravelImg.png" onclick="openLightbox('assets/reels/Travel.mp4')">
  </div>


  <div class="item ads">
    <img src="assets/ads/carImg.png" onclick="openLightbox('assets/ads/carVid.mp4')">
  </div>

  <div class="item ads">
    <img src="assets/ads/PerfumeImg.png" onclick="openLightbox('assets/ads/PerfumeVid.mp4')">
  </div>

  <div class="item ads">
    <img src="assets/ads/PerfumeImg2.png" onclick="openLightbox('assets/ads/PerfumeVid2.mp4')">
  </div>

  <div class="item ads">
    <img src="assets/ads/PerfumeImg3.png" onclick="openLightbox('assets/ads/PerfumeVid3.mp4')">
  </div>

  <div class="item ads">
    <img src="assets/ads/GymImg.png" onclick="openLightbox('assets/ads/GymVid.mp4')">
  </div>


  <div class="item gaming">
    <img src="assets/gaming/GotImg.png" onclick="openLightbox('assets/gaming/GotVid.mp4')">
  </div>

  <div class="item gaming">
    <img src="assets/gaming/GowImg.png" onclick="openLightbox('assets/gaming/GowVid.mp4')">
  </div>

  <div class="item gaming">
    <img src="assets/gaming/rdr2.png" onclick="openLightbox('assets/gaming/Rdr2Vid.mp4')">
  </div>


  <div class="item anime">
    <img src="assets/anime/BleachImg.png" onclick="openLightbox('assets/anime/BleachVid.mp4')">
  </div>

  <div class="item anime">
    <img src="assets/anime/OnepieceImg.png" onclick="openLightbox('assets/anime/OnepieceVid.mp4')">
  </div>

</section>


<div id="lightbox" class="lightbox">
  <span onclick="closeLightbox()">X</span>
  <video id="videoPlayer" controls autoplay></video>
</div>

<script src="script.js"></script>

</body>
</html>
